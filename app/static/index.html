<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Azure Pinecone Chat</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #07111f; color: #edf6ff; }
      main { max-width: 900px; margin: 0 auto; padding: 48px 20px; }
      .eyebrow { color: #72d4ff; font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
      h1 { margin: 8px 0; font-size: clamp(32px, 5vw, 54px); }
      .lede { color: #a8bed3; margin-bottom: 24px; }
      #messages { min-height: 380px; padding: 20px; border: 1px solid #1d3c56; border-radius: 18px; background: #0b1a2b; }
      .message { max-width: 82%; margin: 12px 0; padding: 12px 14px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap; }
      .assistant { background: #12304a; }
      .user { margin-left: auto; background: #155f7c; }
      form { display: flex; gap: 10px; margin-top: 14px; }
      input { flex: 1; border: 1px solid #28506d; border-radius: 12px; background: #0b1a2b; color: #fff; padding: 15px; font-size: 16px; }
      button { border: 0; border-radius: 12px; background: #79dcff; color: #062033; cursor: pointer; font-weight: 800; padding: 0 20px; }
      button:disabled { cursor: wait; opacity: .6; }
      .status { color: #85a7bf; font-size: 13px; margin-top: 12px; }
      a { color: #79dcff; }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Azure App Service + OpenAI + Pinecone</div>
      <h1>Knowledge chat</h1>
      <p class="lede">Ask a question and the endpoint will retrieve matching sample data from Pinecone before answering.</p>
      <section id="messages" aria-live="polite">
        <div class="message assistant">Ready. Try asking: What can this assistant answer?</div>
      </section>
      <form id="chat-form">
        <input id="question" autocomplete="off" placeholder="Ask about the indexed knowledge base..." required>
        <button id="send" type="submit">Send</button>
      </form>
      <div class="status">API health: <a href="/health">/health</a> | Interactive docs: <a href="/docs">/docs</a></div>
    </main>
    <script>
      const form = document.querySelector("#chat-form");
      const question = document.querySelector("#question");
      const send = document.querySelector("#send");
      const messages = document.querySelector("#messages");

      function addMessage(text, role) {
        const element = document.createElement("div");
        element.className = `message ${role}`;
        element.textContent = text;
        messages.appendChild(element);
        messages.scrollTop = messages.scrollHeight;
        return element;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = question.value.trim();
        if (!text) return;
        addMessage(text, "user");
        question.value = "";
        send.disabled = true;
        const pending = addMessage("Searching the knowledge base...", "assistant");
        try {
          const response = await fetch("/rag", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: text, top_k: 5 })
          });
          const body = await response.json();
          if (!response.ok) throw new Error(body.detail || "Request failed");
          pending.textContent = body.answer;
        } catch (error) {
          pending.textContent = `Unable to answer: ${error.message}`;
        } finally {
          send.disabled = false;
          question.focus();
        }
      });
    </script>
  </body>
</html>
